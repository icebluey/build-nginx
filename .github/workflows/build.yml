name: Build
on:
  #push:
  #  branches: [ "master" ]
  #pull_request:
  #  branches: [ "master" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install docker
        run: >
          sudo apt update -y -qqq;
          sudo apt autoremove --purge -y needrestart || true;
          sudo apt install -y bash wget;
          sudo ln -svf bash /bin/sh;
          sudo /bin/bash scripts/clean-os.sh;
          sudo apt upgrade -y -qqq;
          sudo /bin/bash scripts/install-docker.sh

      - name: Build nginx ub2204
        run: |
          sudo /bin/bash run-build-ub2204.sh
          sudo /bin/systemctl stop docker.socket docker.service containerd.service
          sudo /bin/rm -fr /var/lib/docker/* /var/lib/containerd/* /mnt/docker-data/*
      - name: Upload nginx ub2204
        run: |
          _dateutc=$(date -u +%Y-%m-%d-%H%M)
          _repo="$(echo ${{ github.repository }} | awk -F '/' '{print $2}')"
          _nginx_ver="$(sudo ls -1 /home/.tmp/nginx-* | sed -e 's|.*nginx-||g' -e 's|-.*||g' | tail -n1)"
          sudo /bin/ls -lah /home/.tmp/
          sudo /bin/ls -1 /home/.tmp/nginx-* 2>/dev/null | xargs --no-run-if-empty -I '{}' sudo /bin/bash scripts/.upload_file_to_github-release.sh --token ${{ secrets.GITHUB_TOKEN }} --user "${{ github.repository_owner }}" --repo "${_repo}" --file "{}" --tag "v${_dateutc}"
          sleep 2
          sudo /bin/rm -fr /home/.tmp
